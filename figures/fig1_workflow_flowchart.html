ural 2025 \u2014 H\u2082O\u2082/NaClO-KOH digestion validated for fish tissue<br>Analysis (T3): \u00b5-Raman (Vural 2025); visual sort (Provencher 2019 marine bird protocol)<br>Interlaboratory (T3): Tsangaris 2021 \u2014 biota tissue extraction ILC (Plastic Busters)<br>TRL assessment: Vanavermaete 2024 \u2014 method maturity guide for biota matrices<br>GAP: No Tier 1 analytical SOP for biota", "<b>Air / Atmos.</b><br>Best available guidance: <b>Tier 3</b><br><br>Best available: Tier 3 only<br>Sampling (T3): Ashta 2026 \u2014 novel on-site wet deposition filtration; ~90% spike-recovery<br>Sampling (T3): Wright 2021 \u2014 atmospheric deposition screening criteria<br>Review (T4): Ren 2026 \u2014 passive vs. active air sampling; calls for standardization<br>Analysis (T3): FPA-\u00b5FTIR (Ashta 2026) \u2014 particle count and type identification<br>GAP: No Tier 1/2 SOP; active vs. passive sampler debate unresolved<br>Key challenge: highly variable deposition; no consensus on collection period or volume", "<b>Food / Diet</b><br>Best available guidance: <b>Tier 3</b><br><br>Best available: Tier 3 (limited; no sampling-specific SOP)<br>Exposure framework (T3): Gouin 2022 \u2014 dietary + inhalation route framework for human health<br>Quantitative scenarios (T3): Lane 2025 \u2014 multi-route exposure (oral, inhalation, dermal)<br>GAP: No standardized food sampling or matrix-specific extraction SOP<br>No Tier 1/2 guidance for food-specific sample preparation<br>Key challenge: highly variable food matrices (liquids, solids, processed foods)<br>Recommended: adapt DW/biota principles; document all deviations", "<b>Human Tissue</b><br>Best available guidance: <b>Tier 3</b><br><br>Best available: Tier 3 (growing area; no sampling SOP)<br>Spectroscopic ID (T3): Wright 2025b \u2014 FTIR/Raman framework for pathological tissue (in situ)<br>Py-GC-MS (T3): Rauert 2025 \u2014 validated for human blood; mass by polymer type<br>PBK Modeling (T3): Wardani 2024 \u2014 physiologically-based kinetic model for NMP bioaccumulation<br>Exposure (T3): Lane 2025 \u2014 quantitative scenarios across oral/inhalation/dermal routes<br>Risk Integration: Coffin 2022 \u2014 DW monitoring \u2192 human health RA (used in CA regulation)<br>GAP: No standardized clinical collection SOP; no consensus reference material for biomonitoring", "<b>Sampling (Field Collection)</b><br>Best available guidance: <b>Tier 1</b><br><br>Tier by matrix:<br>  Drinking Water (T1): SWRCB/DDW 2025 \u2014 47mm SS in-line filters (20+5 \u00b5m); field blanks 1/event<br>  Sediment & Biota (T1): SCCWRP 2025 (TR 1410.A) \u2014 grab sampling + biota dissection<br>  Surface Water (T3): Sutton 2019, Mayer 2024 \u2014 manta nets, bulk collection; no regulatory SOP<br>  Air / Atmos. (T3): Ashta 2026 (wet deposition device); Wright 2021 (passive deposition)<br>  Food / Human Tissue (T3/Gap): No standardized SOP; adapt nearest matrix guidelines<br>Universal: always record collection vessel, location, date/time, personnel", "<b>Lab Processing & Extraction</b><br>Best available guidance: <b>Tier 1</b><br><br>Tier by matrix:<br>  Drinking Water (T1): SWB-MP1/MP2-rev1 \u2014 density separation; enzymatic digestion option<br>    LOD = mean(blanks) + 3 SD; min n=3; EPA recommends n=7 blanks<br>  Sediment/Biota (T1 framework, T3 methods): SCCWRP 2025; KOH or H\u2082O\u2082/NaClO-KOH digestion<br>  Surface Water (T3): Schymanski 2021 consensus; Vural 2025 (H\u2082O\u2082+KOH)<br>  Air (T3): Ashta 2026 \u2014 on-site filter processing<br>  Food/HumTis (T3/Gap): Adapt DW/biota principles; document deviations<br>Universal contamination control: cotton lab coats, aluminum foil, glass/metal labware", "<b>Sub-sampling (if needed)</b><br>Best available guidance: <b>Tier 4</b><br><br>Cowger et al. 2024 (Tier 4 supporting science):<br>  Minimum 386 particles for polymer distribution at 5% error (95% CI)<br>  Minimum 620 particles for polymer + color + size + morphology<br>  Sample size formula: n = error\u207b\u00b2<br>  Particles must be randomly selected from the full population<br>Applies equally to ALL matrices where sub-sampling is performed<br>GAP: No Tier 1/2/3 SOP for sub-sampling \u2014 supporting science only", "<b>Spectroscopic Analysis</b><br>Best available guidance: <b>Tier 1</b><br><br>Choose method based on particle size and study goals:<br>  FTIR: Best for \u226510 \u00b5m (DW Tier 1: \u22655 \u00b5m); wavenumber 1250\u20133600 cm\u207b\u00b9; HQI >70%<br>  Raman: Best for 1\u201310 \u00b5m (DW Tier 1: \u22651 \u00b5m); wavenumber 200\u20132000 cm\u207b\u00b9; HQI >70%<br>  Py-GC-MS: Mass-based; no size/shape data; all sizes; EU Decision 2024/1441 (DW/SW)<br>Spectral matching: Open Specy 1.0 threshold = 0.7 (>40K spectra, 34 databases)<br>Best tier by matrix: DW=T1; Sed/Bio/SW=T3; Air=T3; Food/HumTis=T3", "<b>FTIR / \u00b5FTIR</b><br>Best available guidance: <b>Tier 1</b><br><br>Tier 1 SOPs (DW): SWB-MP1-rev1, ISO 16094-2:2025, EU Decision 2024/1441<br>Tier 3 general: Schymanski 2021 (12-lab European consensus for clean water)<br>Tier 3 air: Ashta 2026 (FPA-\u00b5FTIR for atmospheric wet deposition; ~90% recovery)<br>Specifications:<br>  Wavenumber range: 1250\u20133600 cm\u207b\u00b9 (minimum); full MID-IR best practice<br>  Spectral resolution: \u22648 cm\u207b\u00b9; HQI threshold: >70%<br>  Particle size: \u22655 \u00b5m (DW SOP); \u226510 \u00b5m typical FPA-\u00b5FTIR<br>Reports: particle count, polymer type, size distribution, morphology", "<b>Raman / \u00b5Raman</b><br>Best available guidance: <b>Tier 1</b><br><br>Tier 1 SOPs (DW): SWB-MP2-rev1, ISO 16094-2:2025<br>Tier 3 general: Schymanski 2021 (12-lab European consensus)<br>Tier 3 multi-matrix: Vural 2025 (\u00b5-Raman after KOH/H\u2082O\u2082 digestion \u2014 SW/Sed/Bio)<br>Specifications:<br>  Wavenumber range: 200\u20132000 cm\u207b\u00b9; laser 532 nm or 785 nm<br>  HQI threshold: >70%; human review recommended above threshold<br>  Particle size: \u22651 \u00b5m; better sensitivity for submicron vs. FTIR<br>Reports: particle count, polymer type, size distribution", "<b>Py-GC-MS</b><br>Best available guidance: <b>Tier 3</b><br><br>Tier 3 (DW/SW): Dalmau-Soler 2025 \u2014 EU Decision 2024/1441 Py-GC-MS implementation<br>  Glass-fiber filter + Py-GC-MS; applied to Llobregat river basin \u2192 Barcelona DW<br>  92\u201399% removal demonstrated in drinking water treatment<br>Tier 3 (Human Blood): Rauert 2025 \u2014 validated Py-GC-MS for blood biomonitoring<br>No Tier 1/2 SOP in any matrix; no consensus calibration or reference material<br>Reports: mass concentration by polymer type (NOT particle count or size)<br>Key advantage: applicable to complex matrices; no particle isolation needed", "<b>QA/QC & Contamination Control</b><br>Best available guidance: <b>Tier 3</b><br><br>Universal requirements (all matrices):<br>Brander et al. 2020 (T3): LOD = mean(blanks) + 3 SD; min 3 procedural blanks/study<br>Cowger et al. 2020b (T3): 8 minimum reporting categories (all matrices)<br>de Ruijter 2020 (T3): 20 QA/QC criteria for effects studies<br>Key rules:<br>  \u2022 Always subtract blank-corrected values; report before AND after correction<br>  \u2022 Contamination control: cotton lab coats, Al foil, glass/metal labware<br>  \u2022 Procedural blanks through all extraction steps<br>  \u2022 Minimum 1 field + 1 procedural blank per 10 samples", "<b>Reporting & Data Deposition</b><br>Best available guidance: <b>Tier 3</b><br><br>Cowger et al. 2020b (T3): 8 minimum reporting categories (applies to all matrices)<br>Data deposition: One4All / Sherrod et al. 2024 (T3/4)<br>  \u2192 openanalysis.org/one4all/ \u2014 81 validation rules, FAIR principles<br>  \u2192 Mandated for CA drinking water monitoring programs<br>Spectral data: Open Specy 1.0 (Cowger 2025) \u2014 >40K spectra, 34 databases<br>DW-specific: Annual reporting to CA DDW; standardized reporting template<br>All matrices MUST report: polymer type, size bins, morphology, blank correction, LOD", "<b>Toxicology / Effects Testing</b><br>Best available guidance: <b>Tier 3</b><br><br>de Ruijter 2020, Gouin 2022, Cowger 2020b (all Tier 3)<br>Key: define study purpose first \u2014 mechanistic vs. hazard/risk vs. dose-response<br>Quality pass rates extremely low:<br>  ToMEx 2.0 (Hampton 2025): only 12% of 286 studies pass screening<br>  NMP-TSAT (Gouin 2022): 16.2% of 74 human health studies pass Tier 1", "<b>Study Type?</b><br>Best available guidance: <b>Tier 3</b><br><br>Ecological / Aquatic: de Ruijter 2020 (20 criteria), ToMEx 2.0 submission<br>Human Health: Gouin 2022 NMP-TSAT (26 in vivo / 23 in vitro criteria), ToMEx-HH<br>Mechanistic: flexible design; NMP-TSAT guidance still applicable<br>Note: de Ruijter 2020 avg score 44.6%; NMP-TSAT 16.2% pass", "<b>Ecological (Aquatic)</b><br>Best available guidance: <b>Tier 3</b><br><br>de Ruijter 2020 (Tier 3): 20 criteria, 4 categories<br>Average published score: 44.6% (0/105 studies scored on all criteria)<br>ToMEx 2.0 (Hampton 2025): only 12% of 286 studies pass for threshold derivation<br>Kennedy et al. 2025: same failures persist 2016\u20132024", "<b>Human Health (In vivo / In vitro)</b><br>Best available guidance: <b>Tier 3</b><br><br>Gouin 2022 NMP-TSAT (Tier 3): 26 criteria (in vivo), 23 (in vitro)<br>Only 12/74 human health studies passed Tier 1 screening (16.2%)<br>OECD test guidelines recommended where applicable<br>Wardani 2024: PBK model for NMP bioaccumulation; Noventa 2021: bioavailability", "<b>Particle Characterization</b><br>Best available guidance: <b>Tier 3</b><br><br>Required by de Ruijter, Gouin, and Cowger 2020b (all Tier 3):<br>  \u2022 Polymer type confirmed by spectroscopy (FTIR or Raman)<br>  \u2022 Full size distribution (\u226510 bins if a range is used)<br>  \u2022 Shape with high-resolution image<br>  \u2022 Both mass AND number concentration<br>Critical: wash particles with organic solvent (remove preservatives/additives)<br>Avoid: unwashed PS spheres without explicit scientific justification", "<b>Reference
